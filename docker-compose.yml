version: "3.8"

services:
  bot:
    build: .
    container_name: vk_ai_admin_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    container_name: vk_ai_admin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vkbot
      POSTGRES_PASSWORD: vkbot_password
      POSTGRES_DB: vkbotdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkbot -d vkbotdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
